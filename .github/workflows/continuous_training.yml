name: Continuous Self-Improvement Training

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'model/**'
      - 'data/**'
      - 'config/**'

jobs:
  train-and-evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 340  # 5h 40m to stay under 6h limit
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Configure Git
      run: |
        git config --global user.name "AutoEvolve Bot"
        git config --global user.email "autoevolve@users.noreply.github.com"
    
    - name: Run training cycle
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UNIPROT_API_KEY: ${{ secrets.UNIPROT_API_KEY }}
        ALPHAFOLD_API_KEY: ${{ secrets.ALPHAFOLD_API_KEY }}
      run: |
        python scripts/train_cycle.py --mode continuous --max-time 18000
    
    - name: Evaluate model performance
      run: |
        python scripts/evaluate.py --checkpoint latest
    
    - name: Architecture evolution
      run: |
        python scripts/evolve_architecture.py --population-size 5 --generations 3
    
    - name: Commit and push improvements
      run: |
        git add -A
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-improvement: Training cycle $(date -u +%Y%m%d-%H%M%S) [skip ci]"
          git push
        fi
    
    - name: Upload training logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: training-logs-${{ github.run_number }}
        path: |
          logs/
          metrics/
        retention-days: 30
    
    - name: Create performance report
      if: success()
      run: |
        python scripts/generate_report.py --output reports/performance_$(date -u +%Y%m%d-%H%M%S).md
        git add reports/
        git commit -m "Add performance report [skip ci]" || true
        git push || true
