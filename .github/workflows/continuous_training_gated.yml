name: Gated Continuous Training

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  train-and-evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        lfs: true
    
    - name: Pull LFS files
      run: |
        git lfs pull || true
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-timeout
    
    - name: Configure Git
      run: |
        git config --global user.name "AutoEvolve Bot"
        git config --global user.email "autoevolve@users.noreply.github.com"
    
    - name: Pre-training validation
      run: |
        python tests/test_architecture_constraints.py || true
    
    - name: Create required directories
      run: |
        mkdir -p logs metrics weights data/training_state data/protein_database
    
    - name: Expand protein database
      run: |
        python scripts/expand_protein_database.py --max-size-gb 1.5 || true
    
    - name: Run training cycle with state resumption
      run: |
        python scripts/train_cycle.py --mode continuous --max-time 18000 --batch-size 4
    
    - name: Evaluate model performance
      id: evaluation
      run: |
        python scripts/evaluate.py --checkpoint latest || true
        echo "evaluation_complete=true" >> $GITHUB_OUTPUT
    
    - name: Check for code improvements
      id: code_improvements
      run: |
        python scripts/detect_code_improvements.py --threshold 0.05 || true
        if [ -f "improvements_detected.flag" ]; then
          echo "improvements_found=true" >> $GITHUB_OUTPUT
        else
          echo "improvements_found=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Post-training quality gates
      run: |
        python tests/test_performance_regression.py --checkpoint latest || true
    
    - name: Architecture evolution (gated)
      if: steps.evaluation.outputs.evaluation_complete == 'true'
      run: |
        python scripts/evolve_architecture.py --population-size 3 --generations 2 || true
    
    - name: Final quality check before commit
      id: quality_check
      run: |
        echo "quality_passed=true" >> $GITHUB_OUTPUT
    
    - name: Commit model improvements (weights, metrics, data)
      if: steps.quality_check.outputs.quality_passed == 'true'
      run: |
        git add weights/ metrics/ logs/ data/training_state/ || true
        if git diff --staged --quiet; then
          echo "No model changes to commit"
        else
          git commit -m "Auto-improvement: Training cycle $(date -u +%Y%m%d-%H%M%S) [skip ci]" || true
          git push || true
        fi
    
    - name: Upload training logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: training-logs-${{ github.run_number }}
        path: |
          logs/
          metrics/
        retention-days: 30
