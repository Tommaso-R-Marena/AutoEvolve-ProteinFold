name: Setup Git LFS

on:
  workflow_dispatch:

jobs:
  setup-lfs:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Git LFS
      run: |
        git lfs install
        git lfs track "*.pt"
        git lfs track "*.pth"
        git lfs track "*.db"
        git lfs track "*.h5"
        git lfs track "*.hdf5"
    
    - name: Commit LFS configuration
      run: |
        git config --global user.name "LFS Setup Bot"
        git config --global user.email "lfs@users.noreply.github.com"
        git add .gitattributes
        git commit -m "Setup Git LFS for large files" || echo "LFS already configured"
        git push
