name: Quality Gates & Testing

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-timeout pylint black flake8
    
    - name: Run code formatting check
      run: |
        black --check model/ scripts/ tests/ || echo "Code formatting issues detected"
    
    - name: Run linting
      run: |
        flake8 model/ scripts/ --max-line-length=120 --ignore=E203,W503 || echo "Linting issues detected"
    
    - name: Run unit tests
      run: |
        pytest tests/ -v --cov=model --cov=scripts --cov-report=xml --cov-report=term
    
    - name: Architecture validation
      run: |
        python tests/test_architecture_constraints.py
    
    - name: Performance regression check
      run: |
        python tests/test_performance_regression.py
    
    - name: Model quality gates
      run: |
        python tests/test_quality_gates.py
    
    - name: Self-modification safety check
      run: |
        python tests/test_self_modification_safety.py
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      if: always()
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
